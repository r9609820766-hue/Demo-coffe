<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - CUP Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefaf5;
            padding: 20px;
        }

        .cart-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cart-header h2 {
            color: #2c1810;
        }

        .continue-btn {
            background: #6f4e37;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
        }

        .cart-items {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .item-details {
            flex: 2;
            min-width: 150px;
        }

        .item-details h4 {
            margin-bottom: 5px;
        }

        .item-price {
            color: #6f4e37;
            font-weight: 600;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-controls button {
            background: #6f4e37;
            color: white;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .cart-summary {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }

        .checkout-btn {
            background: #ff9800;
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .empty-cart {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .empty-cart a {
            display: inline-block;
            margin-top: 15px;
            background: #6f4e37;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="cart-container">
    <div class="cart-header">
        <h2><i class="fas fa-shopping-cart"></i> My Cart</h2>
        <a href="menu-customer.html" class="continue-btn"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>

    <div id="cartContent"></div>
</div>

<script>
    // Get GST from localStorage (admin settings)
    function getGSTPercent() {
        let gst = localStorage.getItem("gstPercent");
        if (gst && !isNaN(parseFloat(gst))) {
            return parseFloat(gst);
        }
        return 0; // Default 0% if not set
    }

    function loadCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const container = document.getElementById("cartContent");
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ccc;"></i>
                    <h3>Your cart is empty!</h3>
                    <p>Add some delicious items from the menu.</p>
                    <a href="menu-customer.html">Browse Menu</a>
                </div>
            `;
            return;
        }
        
        let subtotal = 0;
        let itemsHtml = `<div class="cart-items">`;
        
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.qty;
            subtotal += itemTotal;
            
            itemsHtml += `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80x80?text=Food'">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <div class="item-price">₹${item.price}</div>
                    </div>
                    <div class="qty-controls">
                        <button onclick="updateQty(${index}, -1)">-</button>
                        <span style="width: 30px; text-align: center;">${item.qty}</span>
                        <button onclick="updateQty(${index}, 1)">+</button>
                    </div>
                    <div style="min-width: 80px; font-weight: bold;">₹${itemTotal}</div>
                    <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i> Remove</button>
                </div>
            `;
        });
        
        itemsHtml += `</div>`;
        
        const gstPercent = getGSTPercent();
        const gstAmount = (subtotal * gstPercent) / 100;
        const total = subtotal + gstAmount;
        
        itemsHtml += `
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>₹${subtotal}</span>
                </div>
                ${gstPercent > 0 ? `
                <div class="summary-row">
                    <span>GST (${gstPercent}%):</span>
                    <span>₹${Math.round(gstAmount)}</span>
                </div>
                ` : ''}
                <div class="summary-row" style="font-size: 1.2rem; font-weight: bold;">
                    <span>Total Amount:</span>
                    <span style="color: #6f4e37;">₹${Math.round(total)}</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">
                    <i class="fas fa-credit-card"></i> Proceed to Payment
                </button>
            </div>
        `;
        
        container.innerHTML = itemsHtml;
    }
    
    function updateQty(index, change) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        let newQty = cart[index].qty + change;
        
        if (newQty <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].qty = newQty;
        }
        
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }
    
    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }
    
    function proceedToCheckout() {
        let cart = JSON.parse(localStorage.getItem("cart"));
        if (!cart || cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }
        window.location.href = "order-place.html";
    }
    
    loadCart();
</script>
</body>
</html>
