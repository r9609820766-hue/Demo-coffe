<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Table Booking - CUP Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0f0a 0%, #2c1810 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .booking-main {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .booking-header {
            background: #6f4e37;
            color: white;
            padding: 30px 25px;
            text-align: center;
        }

        .booking-header h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .datetime-section {
            background: #f9f5f0;
            padding: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 1px solid #e8e0d8;
        }

        .datetime-section input, .datetime-section select {
            padding: 12px 20px;
            border: 2px solid #d2b48c;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .check-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: #fefaf5;
            flex-wrap: wrap;
        }

        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 5px;
            margin-right: 8px;
        }

        .table-layout {
            background: #2c1810;
            padding: 30px;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid #ddd;
        }

        .table-card.available {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .table-card.booked {
            background: #f44336;
            color: white;
            border-color: #c62828;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .table-card.selected {
            background: #ff9800;
            color: white;
            border-color: #e65100;
            transform: scale(1.05);
        }

        .slot-selection {
            background: white;
            padding: 25px;
            margin: 20px;
            border-radius: 20px;
        }

        .slot-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }

        .slot-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .slot-btn.available {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .slot-btn.booked-slot {
            background: #ffebee;
            border-color: #f44336;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .slot-btn.selected {
            background: #ff9800;
            color: white;
            border-color: #e65100;
        }

        .slot-counter {
            margin: 20px 0;
            padding: 15px;
            background: #f9f5f0;
            border-radius: 15px;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .counter-control button {
            background: #6f4e37;
            color: white;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .extra-fee-info {
            background: #fff3e0;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
        }

        .booking-form {
            background: white;
            padding: 25px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
        }

        .pay-btn {
            background: #ff9800;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .back-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: #6f4e37;
            text-decoration: none;
        }

        .note-info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 12px;
            margin: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #1565c0;
        }

        @media (max-width: 600px) {
            .table-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="booking-main">
    <div class="booking-header">
        <h2><i class="fas fa-calendar-alt"></i> Table Booking</h2>
        <p>Select date, time slots (1 hour each), and table</p>
    </div>

    <div class="datetime-section">
        <input type="date" id="bookingDate" min="">
        <select id="startTime">
            <option value="">Select Start Time</option>
        </select>
        <button class="check-btn" onclick="checkAvailability()"><i class="fas fa-search"></i> Check Availability</button>
    </div>

    <div class="legend">
        <div><span style="background:#4caf50;"></span> Available</div>
        <div><span style="background:#f44336;"></span> Booked</div>
        <div><span style="background:#ff9800;"></span> Selected</div>
    </div>

    <div class="table-layout">
        <div class="table-grid" id="tableGrid"></div>
    </div>

    <div id="slotSection" style="display:none;">
        <div class="slot-selection">
            <h3><i class="fas fa-clock"></i> Select Time Slots (1 hour each)</h3>
            <div id="slotButtons" class="slot-buttons"></div>
            
            <div class="slot-counter">
                <label><strong>Number of slots to book (1 slot = 1 hour):</strong></label>
                <div class="counter-control">
                    <button onclick="changeSlotCount(-1)">-</button>
                    <span id="slotCount" style="font-size:1.5rem; font-weight:bold;">1</span>
                    <button onclick="changeSlotCount(1)">+</button>
                </div>
                <div id="extraFeeInfo" class="extra-fee-info" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="note-info">
        <i class="fas fa-info-circle"></i> <strong>Note:</strong> Each slot = 1 hour. For longer duration, select multiple slots. 
        Extra slots will have additional charges as set by management.
    </div>

    <div id="bookingForm" style="display:none;">
        <div class="booking-form">
            <h3><i class="fas fa-user-check"></i> Complete Booking</h3>
            <div id="selectedInfo" style="background:#f9f5f0; padding:12px; border-radius:10px; margin-bottom:15px;"></div>
            
            <div class="form-group">
                <label>👤 Name *</label>
                <input type="text" id="customerName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>📞 Mobile *</label>
                <input type="tel" id="customerMobile" placeholder="10 digit mobile number" maxlength="10">
            </div>
            <div class="form-group">
                <label>👥 Guests</label>
                <select id="guestCount">
                    <option value="1">1 Person</option>
                    <option value="2">2 Persons</option>
                    <option value="3">3 Persons</option>
                    <option value="4">4 Persons</option>
                    <option value="5">5 Persons</option>
                    <option value="6">6+ Persons</option>
                </select>
            </div>
            <div class="form-group">
                <label>💬 Special Request</label>
                <input type="text" id="specialRequest" placeholder="Any special request?">
            </div>
            
            <div id="paymentSummary" style="background:#fff3e0; padding:15px; border-radius:12px; margin:15px 0; text-align:center;"></div>
            
            <button class="pay-btn" onclick="proceedToPayment()">💰 Pay Advance & Confirm</button>
        </div>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script>
    // ============ টেবিল ডাটা লোকালস্টোরেজ থেকে লোড করুন ============
    let tables = [];
    
    // ডিফল্ট টেবিল
    const defaultTables = [
        { id: 1, number: "T01", capacity: 2 },
        { id: 2, number: "T02", capacity: 2 },
        { id: 3, number: "T03", capacity: 4 },
        { id: 4, number: "T04", capacity: 4 },
        { id: 5, number: "T05", capacity: 4 },
        { id: 6, number: "T06", capacity: 6 },
        { id: 7, number: "T07", capacity: 6 },
        { id: 8, number: "T08", capacity: 8 }
    ];

    function loadTablesFromStorage() {
        const storedTables = localStorage.getItem("cafeTables");
        if (storedTables && storedTables !== "undefined" && storedTables !== "null") {
            try {
                const parsed = JSON.parse(storedTables);
                if (parsed && parsed.length > 0) {
                    tables = parsed;
                    console.log("✅ Tables loaded from localStorage:", tables.length);
                    return;
                }
            } catch(e) {
                console.error("Error parsing tables:", e);
            }
        }
        tables = JSON.parse(JSON.stringify(defaultTables));
        localStorage.setItem("cafeTables", JSON.stringify(tables));
        console.log("✅ Using default tables:", tables.length);
    }

    // Generate time slots (1 HOUR interval - 09:00, 10:00, 11:00...)
    const timeSlots = [];
    for (let hour = 9; hour <= 22; hour++) {
        let time = `${hour.toString().padStart(2, '0')}:00`;
        timeSlots.push(time);
    }

    let selectedTable = null;
    let selectedSlots = [];
    let slotCount = 1;
    let currentBookings = [];
    let currentDate = "";
    
    function getBaseAdvance() {
        let advance = localStorage.getItem("baseAdvance");
        return advance ? parseInt(advance) : 200;
    }
    
    function getExtraFee() {
        let fee = localStorage.getItem("extraSlotFee");
        return fee ? parseInt(fee) : 50;
    }

    // Set today's date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("bookingDate").min = today;
    document.getElementById("bookingDate").value = today;
    
    // Load time slots dropdown
    const startTimeSelect = document.getElementById("startTime");
    timeSlots.forEach(slot => {
        let option = document.createElement("option");
        option.value = slot;
        option.textContent = slot;
        startTimeSelect.appendChild(option);
    });

    function checkAvailability() {
        currentDate = document.getElementById("bookingDate").value;
        const startTime = document.getElementById("startTime").value;
        
        if (!currentDate || !startTime) {
            alert("Please select date and time");
            return;
        }
        
        // Load bookings from localStorage (only confirmed ones)
        const allBookings = JSON.parse(localStorage.getItem("tableBookings")) || [];
        const confirmedBookings = allBookings.filter(b => b.status === "Confirmed");
        
        // Filter bookings for this date
        currentBookings = confirmedBookings.filter(b => b.date === currentDate);
        
        renderTables();
        loadAvailableSlots();
        
        document.getElementById("slotSection").style.display = "block";
        document.getElementById("bookingForm").style.display = "none";
        selectedTable = null;
        selectedSlots = [];
        slotCount = 1;
        document.getElementById("slotCount").innerText = "1";
    }
    
    // একটি নির্দিষ্ট টেবিলের জন্য স্লট বুকড কিনা চেক করুন (টেবিল ওয়াইজ)
    function isTableSlotBooked(tableId, slot) {
        return currentBookings.some(b => b.tableId === tableId && b.slots && b.slots.includes(slot));
    }
    
    // একটি নির্দিষ্ট টেবিলের জন্য সিলেক্টেড স্লটগুলোর মধ্যে কোনটি বুকড কিনা চেক করুন
    function isTableBookedForSelectedSlots(tableId) {
        for (let i = 0; i < selectedSlots.length && i < slotCount; i++) {
            if (isTableSlotBooked(tableId, selectedSlots[i])) {
                return true;
            }
        }
        return false;
    }
    
    function renderTables() {
        const grid = document.getElementById("tableGrid");
        grid.innerHTML = "";
        
        if (!tables || tables.length === 0) {
            grid.innerHTML = '<div style="color:white; text-align:center; grid-column:1/-1;">No tables available. Please contact admin.</div>';
            return;
        }
        
        tables.forEach(table => {
            // চেক করুন এই টেবিলটি সিলেক্টেড স্লটগুলোর জন্য বুকড কিনা
            const isBooked = isTableBookedForSelectedSlots(table.id);
            const isSelected = (selectedTable && selectedTable.id === table.id);
            
            const card = document.createElement("div");
            card.className = `table-card ${isBooked ? 'booked' : 'available'} ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <div style="font-size:2rem;">🍽️</div>
                <div style="font-weight:bold;">${table.number}</div>
                <div style="font-size:0.8rem;">👥 ${table.capacity}</div>
            `;
            
            if (!isBooked) {
                card.onclick = () => {
                    selectedTable = table;
                    renderTables();
                    loadAvailableSlots();
                    updateBookingForm();
                };
            }
            grid.appendChild(card);
        });
    }
    
    function loadAvailableSlots() {
        const startTime = document.getElementById("startTime").value;
        const startIndex = timeSlots.indexOf(startTime);
        const container = document.getElementById("slotButtons");
        container.innerHTML = "";
        
        if (startIndex === -1) return;
        
        // Show next 10 slots (about 10 hours)
        for (let i = startIndex; i < Math.min(startIndex + 10, timeSlots.length); i++) {
            const slot = timeSlots[i];
            
            // স্লটের উপলব্ধতা নির্ভর করে সিলেক্টেড টেবিলের উপর
            let isBooked = false;
            if (selectedTable) {
                isBooked = isTableSlotBooked(selectedTable.id, slot);
            }
            
            const isSelected = selectedSlots.includes(slot);
            
            const btn = document.createElement("button");
            btn.className = `slot-btn ${isBooked ? 'booked-slot' : 'available'} ${isSelected ? 'selected' : ''}`;
            btn.textContent = slot;
            
            if (!isBooked) {
                btn.onclick = () => toggleSlot(slot);
            }
            container.appendChild(btn);
        }
        
        // যদি কোন টেবিল সিলেক্ট না করা থাকে, তাহলে মেসেজ দেখান
        if (!selectedTable && container.children.length > 0) {
            const msg = document.createElement("div");
            msg.style.cssText = "width:100%; text-align:center; padding:20px; color:#999;";
            msg.innerHTML = "<i class='fas fa-info-circle'></i> Please select a table first to see available slots";
            container.appendChild(msg);
        }
    }
    
    function toggleSlot(slot) {
        const index = selectedSlots.indexOf(slot);
        if (index === -1 && selectedSlots.length < 5) {
            selectedSlots.push(slot);
        } else if (index !== -1) {
            selectedSlots.splice(index, 1);
        }
        selectedSlots.sort();
        loadAvailableSlots();
        renderTables();
        updateBookingForm();
    }
    
    function changeSlotCount(delta) {
        let newCount = slotCount + delta;
        if (newCount >= 1 && newCount <= 5) {
            slotCount = newCount;
            document.getElementById("slotCount").innerText = slotCount;
            updateBookingForm();
            renderTables();
        }
    }
    
    function updateBookingForm() {
        if (!selectedTable || selectedSlots.length === 0) {
            document.getElementById("bookingForm").style.display = "none";
            return;
        }
        
        const extraFee = getExtraFee();
        const extraSlots = Math.max(0, slotCount - 1);
        const extraTotal = extraSlots * extraFee;
        const totalAdvance = getBaseAdvance() + extraTotal;
        
        const selectedSlotList = selectedSlots.slice(0, slotCount);
        
        const infoDiv = document.getElementById("selectedInfo");
        infoDiv.innerHTML = `
            <strong>Selected Table:</strong> ${selectedTable.number}<br>
            <strong>Selected Slots:</strong> ${selectedSlotList.join(", ")}<br>
            <strong>Total Duration:</strong> ${slotCount} hour(s)
        `;
        
        const feeDiv = document.getElementById("extraFeeInfo");
        if (extraSlots > 0) {
            feeDiv.style.display = "block";
            feeDiv.innerHTML = `<i class="fas fa-info-circle"></i> Extra ${extraSlots} slot(s) @ ₹${extraFee}/slot = ₹${extraTotal} extra`;
        } else {
            feeDiv.style.display = "none";
        }
        
        document.getElementById("paymentSummary").innerHTML = `
            <strong>💰 Advance Payment Required:</strong><br>
            Base Advance (1st hour): ₹${getBaseAdvance()}<br>
            ${extraSlots > 0 ? `Extra Slots Fee (${extraSlots} × ₹${extraFee}): ₹${extraTotal}<br>` : ''}
            <span style="font-size:1.2rem; font-weight:bold;">Total: ₹${totalAdvance}</span>
        `;
        
        document.getElementById("bookingForm").style.display = "block";
    }
    
    function proceedToPayment() {
        if (!selectedTable) {
            alert("Please select a table");
            return;
        }
        
        const name = document.getElementById("customerName").value.trim();
        const mobile = document.getElementById("customerMobile").value.trim();
        const guestCount = document.getElementById("guestCount").value;
        const specialRequest = document.getElementById("specialRequest").value;
        const date = document.getElementById("bookingDate").value;
        
        if (!name || !mobile) {
            alert("Please enter name and mobile number");
            return;
        }
        
        if (mobile.length !== 10 || isNaN(mobile)) {
            alert("Please enter valid 10 digit mobile number");
            return;
        }
        
        const selectedSlotList = selectedSlots.slice(0, slotCount);
        
        // চেক করুন সিলেক্টেড স্লটগুলোর মধ্যে কোনটি ইতিমধ্যে বুকড কিনা
        for (let i = 0; i < selectedSlotList.length; i++) {
            if (isTableSlotBooked(selectedTable.id, selectedSlotList[i])) {
                alert(`Sorry! Table ${selectedTable.number} is already booked for slot ${selectedSlotList[i]}. Please select different time.`);
                return;
            }
        }
        
        const extraFee = getExtraFee();
        const extraSlots = slotCount - 1;
        const totalAdvance = getBaseAdvance() + (extraSlots * extraFee);
        
        const bookingData = {
            bookingId: "BK" + Date.now(),
            tableId: selectedTable.id,
            tableNumber: selectedTable.number,
            customerName: name,
            customerMobile: mobile,
            guestCount: guestCount,
            specialRequest: specialRequest,
            date: date,
            slots: selectedSlotList,
            slotCount: slotCount,
            totalHours: slotCount,
            totalMinutes: slotCount * 60,
            advancePaid: totalAdvance,
            baseAdvance: getBaseAdvance(),
            extraFeeApplied: extraSlots * extraFee,
            bookingTime: new Date().toISOString(),
            status: "Pending Payment"
        };
        
        localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
        window.location.href = "payment-demo.html?amount=" + totalAdvance + "&type=booking";
    }

    // লোকালস্টোরেজ পরিবর্তন ট্র্যাক করুন
    let lastTablesData = null;

    function checkForTableUpdates() {
        const currentTables = localStorage.getItem("cafeTables");
        if (currentTables !== lastTablesData) {
            lastTablesData = currentTables;
            loadTablesFromStorage();
            if (currentDate) {
                renderTables();
            }
            console.log("🔄 Tables updated from admin panel");
        }
        setTimeout(checkForTableUpdates, 3000);
    }

    // পেজ লোড হলে
    loadTablesFromStorage();
    lastTablesData = localStorage.getItem("cafeTables");
    setTimeout(checkForTableUpdates, 2000);
</script>
</body>
</html>
