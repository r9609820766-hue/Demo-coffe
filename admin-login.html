<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CUP Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0f0a 0%, #2c1810 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2rem;
            color: #6f4e37;
        }

        .logo span {
            color: #d4a373;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #2c1810;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c1810;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e0d8;
            border-radius: 15px;
            font-size: 1rem;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6f4e37;
            box-shadow: 0 0 0 3px rgba(111,78,55,0.1);
        }

        .login-btn {
            width: 100%;
            background: #6f4e37;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #5a3e2e;
            transform: translateY(-2px);
        }

        .role-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        .role-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 30px;
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: 0.3s;
        }

        .role-btn.active {
            background: #6f4e37;
            color: white;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>CUP <span>Coffee</span></h1>
    </div>
    
    <div class="login-header">
        <h2><i class="fas fa-user-shield"></i> Management Login</h2>
        <p>Select your role and enter credentials</p>
    </div>

    <div class="role-buttons">
        <button class="role-btn active" onclick="setRole('admin')">👑 Admin</button>
        <button class="role-btn" onclick="setRole('employee')">👨‍🍳 Employee</button>
        <button class="role-btn" onclick="setRole('kitchen')">🍳 Kitchen</button>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username / Employee ID</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>

    <div class="info-text">
        <i class="fas fa-info-circle"></i> Demo Credentials:<br>
        Admin: admin / admin123 | Employee: emp001 / emp123 | Kitchen: kitchen001 / kitchen123
    </div>
</div>

<script>
    let currentRole = "admin";

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // Update placeholder based on role
        const userInput = document.getElementById("username");
        if (role === "admin") {
            userInput.placeholder = "Username (admin)";
        } else if (role === "employee") {
            userInput.placeholder = "Employee ID (emp001)";
        } else {
            userInput.placeholder = "Kitchen ID (kitchen001)";
        }
    }

    function handleLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (currentRole === "admin") {
            if (username === "admin" && password === "admin123") {
                localStorage.setItem("adminLoggedIn", "true");
                localStorage.setItem("userRole", "admin");
                window.location.href = "admin-dashboard.html";
            } else {
                alert("Invalid Admin credentials! Use admin / admin123");
            }
        } 
        else if (currentRole === "employee") {
            // Check from employee list
            const employees = JSON.parse(localStorage.getItem("employees")) || [];
            const validEmployee = employees.find(emp => emp.id === username && emp.password === password);
            
            if (validEmployee || (username === "emp001" && password === "emp123")) {
                localStorage.setItem("employeeLoggedIn", "true");
                localStorage.setItem("userRole", "employee");
                localStorage.setItem("employeeId", username);
                window.location.href = "employee-dashboard.html";
            } else {
                alert("Invalid Employee credentials! Contact admin.");
            }
        }
        else if (currentRole === "kitchen") {
            // Check from kitchen staff list
            const kitchenStaff = JSON.parse(localStorage.getItem("kitchenStaff")) || [];
            const validKitchen = kitchenStaff.find(k => k.id === username && k.password === password);
            
            if (validKitchen || (username === "kitchen001" && password === "kitchen123")) {
                localStorage.setItem("kitchenLoggedIn", "true");
                localStorage.setItem("userRole", "kitchen");
                localStorage.setItem("kitchenId", username);
                window.location.href = "kitchen-dashboard.html";
            } else {
                alert("Invalid Kitchen credentials! Contact admin.");
            }
        }
    }
</script>
</body>
</html>
